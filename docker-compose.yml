services:
  web:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1 --proxy-headers --forwarded-allow-ips="*" --log-level ${UVICORN_LOG_LEVEL:-debug}
    environment:
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-DEBUG}
      CRAWLER_PROVIDER: ${CRAWLER_PROVIDER:-hyperbrowser}
      HYPERBROWSER_API_KEY: ${HYPERBROWSER_API_KEY:-}
      HYPERBROWSER_WAIT_UNTIL: ${HYPERBROWSER_WAIT_UNTIL:-load}
      HYPERBROWSER_WAIT_FOR_MS: ${HYPERBROWSER_WAIT_FOR_MS:-1500}
      HYPERBROWSER_TIMEOUT_MS: ${HYPERBROWSER_TIMEOUT_MS:-30000}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://172.30.1.2:11434}
      OLLAMA_FALLBACK_HOSTS: ${OLLAMA_FALLBACK_HOSTS:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3.5}
      OLLAMA_FALLBACK_MODELS: ${OLLAMA_FALLBACK_MODELS:-}
      OLLAMA_TIMEOUT_MS: ${OLLAMA_TIMEOUT_MS:-240000}
      LOCAL_CRAWLER_BACKEND: ${LOCAL_CRAWLER_BACKEND:-playwright}
      LOCAL_CRAWLER_HEADLESS: ${LOCAL_CRAWLER_HEADLESS:-true}
      LOCAL_CRAWLER_WAIT_UNTIL: ${LOCAL_CRAWLER_WAIT_UNTIL:-networkidle}
      LOCAL_CRAWLER_WAIT_FOR_MS: ${LOCAL_CRAWLER_WAIT_FOR_MS:-1000}
      LOCAL_CRAWLER_TIMEOUT_MS: ${LOCAL_CRAWLER_TIMEOUT_MS:-45000}
      LOCAL_CRAWLER_BLOCK_MEDIA: ${LOCAL_CRAWLER_BLOCK_MEDIA:-true}
      LOCAL_CRAWLER_USER_AGENT: ${LOCAL_CRAWLER_USER_AGENT:-FakeNewsChecker/1.0}
      LOCAL_CRAWLER_MCP_ENABLED: ${LOCAL_CRAWLER_MCP_ENABLED:-false}
      ANALYSIS_ARTIFACT_ROOT: ${ANALYSIS_ARTIFACT_ROOT:-downloaded_news}
    ports:
      - "8000:8000"
    volumes:
      - ./${ANALYSIS_ARTIFACT_ROOT:-downloaded_news}:/app/${ANALYSIS_ARTIFACT_ROOT:-downloaded_news}
